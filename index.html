<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Nexus Clinical Pharmacist</title>

  <script>
    // No-auth build: open the workspace directly and call the Vercel API.
    window.NEXUS_API_ENDPOINT = window.NEXUS_API_ENDPOINT || "/api/chat";
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4.8.3" />
</head>
<body class="app-active" data-theme="light" data-mode="general_chat">
  <!-- v4.8.3 hard no-auth build: there is no login gate. -->
  <section id="authPage" class="hidden" aria-hidden="true"></section>
  <div id="appRoot" class="app-shell">
    <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

    <aside id="sidebar" class="sidebar" aria-label="Application sidebar">
      <div class="sidebar-top">
        <div class="brand-row">
          <div class="logo-mark">Nx</div>
          <div class="brand-text">
            <div class="brand-title">Nexus</div>
            <div class="brand-subtitle">Clinical Pharmacist</div>
          </div>
        </div>
        <button id="closeSidebarBtn" class="icon-btn mobile-only" type="button" aria-label="Close sidebar">×</button>
      </div>

      <button id="newChatBtn" class="btn btn-new" type="button">
        <span>＋</span>
        New chat
      </button>

      <section class="side-section history-section" aria-labelledby="historyTitle">
        <div class="history-head">
          <div id="historyTitle" class="side-title">Chat history</div>
          <button id="toggleArchiveBtn" class="tiny-btn" type="button">Archive</button>
        </div>
        <div id="chatHistory" class="chat-history" role="list"></div>
      </section>

      <footer class="sidebar-footer">
        <button id="themeToggleBtn" class="footer-btn" type="button">
          <span id="themeIcon">☾</span>
          <span>Dark mode</span>
        </button>
        <div class="user-card">
          <div id="userAvatar" class="user-avatar">A</div>
          <div class="user-meta">
            <strong id="userName">User</strong>
            <small id="userEmail">user@example.com</small>
          </div>
          <button id="logoutBtn" class="icon-btn" type="button" aria-label="Logout">⎋</button>
        </div>
      </footer>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="openSidebarBtn" class="icon-btn mobile-only" type="button" aria-label="Open sidebar">☰</button>
        <div class="topbar-title">
          <div class="active-mode-pill" id="activeModePill">General Chat</div>
          <h1 id="conversationTitle">New chat</h1>
        </div>
        <div class="topbar-actions">
          <div class="mode-switcher" id="modeSwitcher" aria-label="Conversation mode">
            <button class="mode-chip-btn active" type="button" data-mode="general_chat">General</button>
            <button class="mode-chip-btn" type="button" data-mode="drug_interaction">Interaction</button>
            <button class="mode-chip-btn" type="button" data-mode="case_analysis">Case</button>
            <button class="mode-chip-btn" type="button" data-mode="drug_reverse">Reverse</button>
          </div>
          <button id="newChatTopBtn" class="btn btn-soft btn-icon-label" type="button" title="New chat" aria-label="New chat"><span>＋</span><span class="desktop-label">New chat</span></button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>
      <nav id="messageRail" class="message-rail" aria-label="Message navigation"></nav>

      <section class="composer-wrap">
        <div id="attachedFiles" class="attached-files hidden"></div>

        <form id="chatForm" class="composer">
          <button id="attachBtn" class="composer-icon" type="button" aria-label="Attach files">＋</button>
          <input id="fileInput" class="hidden" type="file" multiple accept=".pdf,image/*,.txt,.md,.csv,.json" />
          <textarea id="messageInput" rows="1" placeholder="Message Nexus…" autocomplete="off"></textarea>
          <button id="sendBtn" class="send-btn" type="submit" aria-label="Send message">↑</button>
        </form>

        <div class="composer-footer">
          <button id="stopBtn" class="stop-btn hidden" type="button">Stop generating</button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>


  <noscript>
    <div style="position:fixed;inset:16px;z-index:9999;background:#fff;color:#111;padding:20px;border-radius:16px;font-family:Arial">JavaScript is required to run Nexus.</div>
  </noscript>
  <script>
    window.NEXUS_BUILD = "v4.8.3-hard-noauth";
    window.NEXUS_API_ENDPOINT = window.NEXUS_API_ENDPOINT || "/api/chat";
    window.addEventListener("error", function(event) {
      console.error("Nexus boot error", event.error || event.message);
      var toast = document.getElementById("toast");
      if (toast) {
        toast.textContent = "Nexus startup error: " + (event.error?.message || event.message || "unknown error");
        toast.classList.remove("hidden");
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script type="module" src="script.js?v=4.8.3"></script>
</body>
</html>
