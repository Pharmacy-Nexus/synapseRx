<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Rx</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">Nx</div>
        <div>
          <div class="brand-title">Nexus Rx</div>
          <div class="brand-subtitle">Clinical AI Assistant</div>
        </div>
      </div>

      <button id="newChatBtn" class="new-btn">New Consultation</button>

      <div class="nav-label">Main</div>
      <button class="nav-item active" id="newChatMirror">New Chat</button>

      <div class="nav-label">Recent History</div>
      <div id="chatList" class="history-list"></div>

      <div class="nav-label">Tools</div>
      <div class="tool-list">
        <button class="tool-tab tool-general active" data-command="">General</button>
        <button class="tool-tab tool-case" data-command="@case ">Case</button>
        <button class="tool-tab tool-safety" data-command="@safety ">Safety</button>
        <button class="tool-tab tool-compare" data-command="@compare ">Compare</button>
        <button class="tool-tab tool-reverse" data-command="@reverse ">Reverse</button>
        <button class="tool-tab tool-report" data-command="@report ">Report</button>
      </div>

      <div class="spacer"></div>

      <button class="nav-item subtle" id="pinChatBtn">Pin Chat</button>
      <button class="nav-item subtle" id="renameChatBtn">Rename</button>
      <button class="nav-item subtle danger-text" id="deleteChatBtn">Delete</button>

      <div class="profile">
        <div class="profile-avatar">DR</div>
        <div>
          <div class="profile-name">Dr. Pharmacist</div>
          <div class="profile-role">Lead Clinical RPh</div>
        </div>
      </div>
    </aside>

    <main class="chat-area">
      <header class="topbar">
        <div>
          <div class="page-title">Nexus Rx Chat Interface</div>
          <div class="page-subtitle">Clinical answers. Clean notes. No noise.</div>
        </div>
        <button id="exportPdfBtn" class="outline-btn">Report PDF</button>
      </header>

      <section id="messages" class="messages"></section>

      <section class="composer-zone">
        <form id="chatForm" class="composer">
          <textarea id="messageInput" rows="1" placeholder="Ask about a drug, interaction, protocol, or patient case..."></textarea>
          <button id="sendBtn" type="submit" aria-label="Send">➤</button>
        </form>
        <div class="footer-note">Nexus Rx can make mistakes. Verify clinical information with primary sources.</div>
      </section>
    </main>
  </div>

  <div id="pdfModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <div class="modal-title">Editable Report Preview</div>
          <div class="modal-subtitle">Edit before exporting</div>
        </div>
        <button id="closePdfModal" class="outline-btn">Close</button>
      </div>
      <textarea id="pdfEditor" class="pdf-editor"></textarea>
      <div class="modal-actions">
        <button id="downloadPdfBtn" class="new-btn">Download PDF</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
