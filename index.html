<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Nexus Clinical Pharmacist</title>

  <script>
    // No-auth build: open the workspace directly and call the Vercel API.
    window.NEXUS_API_ENDPOINT = window.NEXUS_API_ENDPOINT || "/api/chat";
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=5.1.0" />
</head>
<body class="app-active" data-theme="light" data-mode="general_chat">
  <!-- v4.8.3 hard no-auth build: there is no login gate. -->
  <section id="authPage" class="hidden" aria-hidden="true"></section>
  <div id="appRoot" class="app-shell">
    <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

    <aside id="sidebar" class="sidebar" aria-label="Application sidebar">
      <div class="sidebar-top">
        <div class="brand-row">
          <div class="logo-mark">Nx</div>
          <div class="brand-text">
            <div class="brand-title">Nexus</div>
            <div class="brand-subtitle">Clinical Pharmacist</div>
          </div>
        </div>
        <button id="closeSidebarBtn" class="icon-btn mobile-only" type="button" aria-label="Close sidebar">×</button>
      </div>

      <button id="newChatBtn" class="btn btn-new" type="button">
        <span>＋</span>
        New chat
      </button>

      <section class="side-section history-section" aria-labelledby="historyTitle">
        <div class="history-head">
          <div id="historyTitle" class="side-title">Chat history</div>
          <button id="toggleArchiveBtn" class="tiny-btn" type="button">Archive</button>
        </div>
        <div id="chatHistory" class="chat-history" role="list"></div>
      </section>

      <section class="side-section quick-section" aria-labelledby="quickTitle">
        <div class="quick-head">
          <div>
            <div id="quickTitle" class="side-title">My Quick Access</div>
            <small id="quickAccessCount" class="quick-count">0 saved</small>
          </div>
          <button id="quickAccessAddBtn" class="tiny-btn" type="button" title="Add note">＋</button>
        </div>
        <input id="quickAccessSearch" class="quick-search" type="search" placeholder="Search notes or #tags" autocomplete="off" />
        <div id="quickAccessList" class="quick-list" role="list"></div>
      </section>

      <section class="side-section work-section" aria-labelledby="workShelfTitle">
        <div class="work-head">
          <div>
            <div id="workShelfTitle" class="side-title">Work Shelf</div>
            <small id="workShelfCount" class="quick-count">0 items</small>
          </div>
          <button id="workShelfClearBtn" class="tiny-btn" type="button" title="Clear shelf">Clear</button>
        </div>
        <div id="workShelfList" class="work-list" role="list"></div>
        <div class="work-actions" aria-label="Generate from Work Shelf">
          <button class="work-action-btn" type="button" data-work-generate="intervention_note">Intervention</button>
          <button class="work-action-btn" type="button" data-work-generate="patient_counseling">Counsel</button>
          <button class="work-action-btn" type="button" data-work-generate="prescriber_message">Prescriber</button>
          <button class="work-action-btn" type="button" data-work-generate="monitoring_plan">Monitor</button>
        </div>
      </section>

      <footer class="sidebar-footer">
        <button id="themeToggleBtn" class="footer-btn" type="button">
          <span id="themeIcon">☾</span>
          <span>Dark mode</span>
        </button>
        <div class="user-card">
          <div id="userAvatar" class="user-avatar">A</div>
          <div class="user-meta">
            <strong id="userName">User</strong>
            <small id="userEmail">user@example.com</small>
          </div>
          <button id="logoutBtn" class="icon-btn" type="button" aria-label="Logout">⎋</button>
        </div>
      </footer>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="openSidebarBtn" class="icon-btn mobile-only" type="button" aria-label="Open sidebar">☰</button>
        <div class="topbar-title">
          <div class="active-mode-pill" id="activeModePill">General Chat</div>
          <h1 id="conversationTitle">New chat</h1>
        </div>
        <div class="topbar-actions">
          <div class="mode-switcher" id="modeSwitcher" aria-label="Conversation mode">
            <button class="mode-chip-btn active" type="button" data-mode="general_chat">General</button>
            <button class="mode-chip-btn" type="button" data-mode="drug_interaction">Interaction</button>
            <button class="mode-chip-btn" type="button" data-mode="case_analysis">Case</button>
            <button class="mode-chip-btn" type="button" data-mode="drug_reverse">Reverse</button>
          </div>
          <button id="newChatTopBtn" class="btn btn-soft btn-icon-label" type="button" title="New chat" aria-label="New chat"><span>＋</span><span class="desktop-label">New chat</span></button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>
      <nav id="messageRail" class="message-rail" aria-label="Message navigation"></nav>

      <section class="composer-wrap">
        <div id="attachedFiles" class="attached-files hidden"></div>

        <form id="chatForm" class="composer">
          <button id="attachBtn" class="composer-icon" type="button" aria-label="Attach files">＋</button>
          <input id="fileInput" class="hidden" type="file" multiple accept=".txt,.md,.csv,.json" />
          <textarea id="messageInput" rows="1" placeholder="Message Nexus…" autocomplete="off"></textarea>
          <button id="sendBtn" class="send-btn" type="submit" aria-label="Send message">↑</button>
        </form>

        <div class="composer-footer">
          <button id="stopBtn" class="stop-btn hidden" type="button">Stop generating</button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>


  <div id="quickAccessModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="quickAccessModalTitle">
    <div class="modal-card quick-modal-card">
      <div class="modal-head">
        <div>
          <div id="quickAccessModalTitle" class="modal-title">Save to Quick Access</div>
          <div class="modal-subtitle">Pin clinical notes, counseling scripts, rules, or templates for fast recall.</div>
        </div>
        <button id="quickAccessCancelBtn" class="icon-btn" type="button" aria-label="Close">×</button>
      </div>
      <label class="quick-field">
        <span>Title</span>
        <input id="quickAccessTitleInput" type="text" placeholder="e.g. ACEI + potassium checklist" />
      </label>
      <label class="quick-field">
        <span>Tags</span>
        <input id="quickAccessTagsInput" type="text" placeholder="renal, hyperkalemia, counseling" />
      </label>
      <label class="quick-field">
        <span>Note</span>
        <textarea id="quickAccessContentInput" rows="7" placeholder="Paste the clinical note, script, or rule here…"></textarea>
      </label>
      <div class="modal-actions">
        <button id="quickAccessDeleteBtn" class="btn btn-soft danger-soft hidden" type="button">Delete</button>
        <span></span>
        <button id="quickAccessSaveBtn" class="btn btn-primary" type="button">Save note</button>
      </div>
    </div>
  </div>


  <noscript>
    <div style="position:fixed;inset:16px;z-index:9999;background:#fff;color:#111;padding:20px;border-radius:16px;font-family:Arial">JavaScript is required to run Nexus.</div>
  </noscript>
  <script>
    window.NEXUS_BUILD = "v5.1.0-shadow-check";
    window.NEXUS_API_ENDPOINT = window.NEXUS_API_ENDPOINT || "/api/chat";
    window.addEventListener("error", function(event) {
      console.error("Nexus boot error", event.error || event.message);
      var toast = document.getElementById("toast");
      if (toast) {
        toast.textContent = "Nexus startup error: " + (event.error?.message || event.message || "unknown error");
        toast.classList.remove("hidden");
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script type="module" src="script.js?v=5.1.0"></script>
</body>
</html>
